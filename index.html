<div id="app"></div>
<style>

.tablepick{

.menurow{

}

.overlay{position:fixed;inset:0;background:rgba(35,38,58,0.45);display:flex;align-items:center;justify-content:center;z-index:60;}

.closeX{

}
.toast{

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  const app = document.getElementById('app');
  const CAT_ICON = {'Noodles':'🍜','Snack':'🍘','Add On':'➕','Classic Coffee':'☕','Kopi Susu':'🧋','Coffee Mocktails':'🍹','Milk Based':'🥛','Refreshments':'🍋'};
  const PALETTE = ['#7C5CFC','#FF7A59','#16A3B8','#E0A526','#3D8BFD','#E14F4B','#28B978','#B33DC6','#0EA5E9','#D6336C','#2F9E44','#5B3FE0'];

  const SUPABASE_URL = 'https://vchqvbnkhssauuxyxaoa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_LHs-GJfbb8vmNebtWtI2tA_Ln_biOqR';
  let sb = null;
  let dbReady = false;
  let dbErrorMsg = '';
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }catch(e){
    dbErrorMsg = 'Library Supabase gagal dimuat. Buka file ini di luar Claude (misal lewat Vercel) supaya bisa konek ke database.';
  }

  let state = { tables: [], menu: [], orders: {} };

  let view = 'map';
  let editMode = false;
  let openTableId = null;
  let confirmCloseTableId = null;
  let splitPayOpen = null; // {tableId, selections:{itemId:qty}, method}
  let newOrderActive = false;
  let draftItems = [];
  let draftTableId = null;
  let orderSearch = '';
  let orderCatFilter = 'Semua';
  let menuCatFilter = 'Semua';
  let menuFormOpen = null;
  let tableFormOpen = null;
  let toastTimer = null;

  function showToast(msg){
    const t = document.getElementById('toastEl');
    if(t){ t.textContent = msg; t.classList.add('show'); }
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ const el=document.getElementById('toastEl'); if(el) el.classList.remove('show'); }, 1700);
  }
  function reportError(err, label){
    console.error(label, err);
    showToast('Gagal sync ke database ('+label+')');
  }

  // ---------- load from Supabase ----------
  async function loadState(){
    if(!sb){ render(); return; }
    try{
      const [{data:tables,error:e1}, {data:menu,error:e2}, {data:orders,error:e3}, {data:items,error:e4}] = await Promise.all([
        sb.from('pos_tables').select('*'),
        sb.from('pos_menu').select('*'),
        sb.from('pos_orders').select('*'),
        sb.from('pos_order_items').select('*')
      ]);
      if(e1||e2||e3||e4) throw (e1||e2||e3||e4);
      state.tables = (tables||[]).map(t=>({id:t.id, name:t.name, x:Number(t.x), y:Number(t.y)}));
      state.menu = (menu||[]).map(m=>({id:m.id, name:m.name, price:m.price, cat:m.category}));
      state.orders = {};
      (orders||[]).forEach(o=>{ state.orders[o.table_id] = {items:[], openedAt: o.created_at ? new Date(o.created_at).getTime() : Date.now()}; });
      (items||[]).forEach(it=>{
        if(!state.orders[it.table_id]) state.orders[it.table_id] = {items:[], openedAt:Date.now()};
        state.orders[it.table_id].items.push({
          id: it.id, menuId: it.menu_id, name: it.name, price: it.price, qty: it.qty,
          status: it.status, addedAt: new Date(it.added_at).getTime(), paymentMethod: it.payment_method || null
        });
      });
      dbReady = true;
    }catch(e){
      dbErrorMsg = 'Gagal mengambil data dari Supabase. Cek koneksi internet atau jalankan file ini lewat hosting (Vercel), bukan dari dalam Claude.';
      console.error(e);
    }
    render();
  }

  function order(tableId){ return state.orders[tableId]; }
  function ensureOrderLocal(tableId){ if(!state.orders[tableId]) state.orders[tableId]={items:[],openedAt:Date.now()}; return state.orders[tableId]; }
  function tableById(id){ return state.tables.find(t=>t.id===id); }
  function tableColor(tableId){
    const idx = state.tables.findIndex(t=>t.id===tableId);
    return PALETTE[(idx<0?0:idx) % PALETTE.length];
  }
  function fmtMoney(n){ return 'Rp' + n.toLocaleString('id-ID'); }
  function itemsTotal(items){ return items.reduce((s,it)=>s+it.price*it.qty,0); }
  function timeAgo(ts){
    const mins = Math.floor((Date.now()-ts)/60000);
    if(mins<1) return 'baru saja';
    if(mins===1) return '1 menit lalu';
    return mins+' menit lalu';
  }
  function tableStatus(tableId){
    const o = order(tableId);
    if(!o || o.items.length===0) return 'empty';
    if(o.items.some(it=>it.status==='pending')) return 'pending';
    if(o.items.some(it=>!it.paymentMethod)) return 'unpaid';
    return 'done';
  }
  function paymentBreakdown(items){
    const out = {cash:0, qris:0, belum:0};
    items.forEach(it=>{
      const sub = it.price*it.qty;
      if(it.paymentMethod==='cash') out.cash += sub;
      else if(it.paymentMethod==='qris') out.qris += sub;
      else out.belum += sub;
    });
    return out;
  }
  function tableMetaLabel(items){
    const b = paymentBreakdown(items);
    const parts = [];
    if(b.cash>0) parts.push('Cash');
    if(b.qris>0) parts.push('QRIS');
    if(b.belum>0) parts.push(parts.length?'+blm bayar':'Belum Bayar');
    return parts.join(' ') || 'Lunas';
  }
  function allPendingGroups(){
    let groups = [];
    Object.keys(state.orders).forEach(tid=>{
      const pend = state.orders[tid].items.filter(it=>it.status==='pending');
      if(pend.length===0) return;
      pend.sort((a,b)=>a.addedAt-b.addedAt);
      groups.push({ tableId:tid, tableName: tableById(tid)?tableById(tid).name:'?', items:pend, earliest: pend[0].addedAt });
    });
    groups.sort((a,b)=>a.earliest-b.earliest);
    return groups;
  }
  function pendingCountTotal(){
    return Object.values(state.orders).reduce((s,o)=>s+o.items.filter(i=>i.status==='pending').length,0);
  }
  function displayQtyFor(items, menuId){ return items.filter(it=>it.menuId===menuId).reduce((s,it)=>s+it.qty,0); }

  function applyIncrement(items, m){
    let target=null;
    for(let i=items.length-1;i>=0;i--){ if(items[i].menuId===m.id && items[i].status==='pending' && !items[i].paymentMethod){ target=items[i]; break; } }
    if(target){ target.qty += 1; return {mode:'update', item:target}; }
    const newItem = {id:'it'+Date.now()+Math.random().toString(36).slice(2,6), menuId:m.id, name:m.name, price:m.price, qty:1, status:'pending', addedAt:Date.now(), paymentMethod:null};
    items.push(newItem);
    return {mode:'insert', item:newItem};
  }
  function applyDecrement(items, m){
    let idx=-1;
    for(let i=items.length-1;i>=0;i--){ if(items[i].menuId===m.id && items[i].status==='pending' && !items[i].paymentMethod){ idx=i; break; } }
    if(idx===-1) return null;
    if(items[idx].qty>1){ items[idx].qty -=1; return {mode:'update', item:items[idx]}; }
    const removed = items[idx];
    items.splice(idx,1);
    return {mode:'delete', item:removed};
  }

  // ---------- mutations (optimistic local update + supabase sync) ----------
  function incrementMenuQtyExisting(tableId, m){
    const o = ensureOrderLocal(tableId);
    const res = applyIncrement(o.items, m);
    render();
    (async ()=>{
      try{
        await sb.from('pos_orders').upsert({table_id:tableId});
        if(res.mode==='insert'){
          await sb.from('pos_order_items').insert({id:res.item.id, table_id:tableId, menu_id:res.item.menuId, name:res.item.name, price:res.item.price, qty:res.item.qty, status:res.item.status, added_at:new Date(res.item.addedAt).toISOString(), payment_method:null});
        } else {
          await sb.from('pos_order_items').update({qty:res.item.qty}).eq('id', res.item.id);
        }
      }catch(e){ reportError(e,'tambah item'); }
    })();
  }
  function decrementMenuQtyExisting(tableId, m){
    const o = order(tableId); if(!o) return;
    const res = applyDecrement(o.items, m);
    if(!res) return;
    const nowEmpty = o.items.length===0;
    render();
    (async ()=>{
      try{
        if(res.mode==='update'){
          await sb.from('pos_order_items').update({qty:res.item.qty}).eq('id', res.item.id);
        } else {
          await sb.from('pos_order_items').delete().eq('id', res.item.id);
          if(nowEmpty) await sb.from('pos_orders').delete().eq('table_id', tableId);
        }
      }catch(e){ reportError(e,'kurangi item'); }
    })();
  }
  function toggleItemStatus(tableId, itemId){
    const o = order(tableId); const it = o.items.find(i=>i.id===itemId);
    it.status = it.status==='pending'?'served':'pending';
    render();
    sb.from('pos_order_items').update({status:it.status}).eq('id', itemId).then(({error})=>{ if(error) reportError(error,'update status'); });

  function removeItem(tableId, itemId){
    const o = order(tableId); o.items = o.items.filter(i=>i.id!==itemId);
    const nowEmpty = o.items.length===0;
    render();
    (async ()=>{
      try{
        await sb.from('pos_order_items').delete().eq('id', itemId);
        if(nowEmpty) await sb.from('pos_orders').delete().eq('table_id', tableId);
      }catch(e){ reportError(e,'hapus item'); }
    })();
  }
  function unpaidLines(items){
    return items.filter(it=>!it.paymentMethod);
  }
  function itemsRefFor(sp){
    return sp.mode==='draft' ? draftItems : (order(sp.tableId) ? order(sp.tableId).items : []);
  }
  async function processSplitPayment(){
    const sp = splitPayOpen; if(!sp) return;
    const items = itemsRefFor(sp);
    const dbOps = [];
    sp.lines.forEach(l=>{
      const qty = sp.selections[l.id]||0;
      if(qty<=0) return;
      const item = items.find(i=>i.id===l.id);
      if(!item) return;
      if(qty>=item.qty){
        item.paymentMethod = sp.method;
        if(sp.mode!=='draft') dbOps.push(sb.from('pos_order_items').update({payment_method:sp.method}).eq('id', item.id));
      } else {
        item.qty -= qty;
        const paidPortion = {
          id:'it'+Date.now()+Math.random().toString(36).slice(2,6),
          menuId:item.menuId, name:item.name, price:item.price, qty:qty,
          status:item.status, addedAt:item.addedAt, paymentMethod:sp.method
        };
        items.push(paidPortion);
        if(sp.mode!=='draft'){
          dbOps.push(sb.from('pos_order_items').update({qty:item.qty}).eq('id', item.id));
          dbOps.push(sb.from('pos_order_items').insert({id:paidPortion.id, table_id:sp.tableId, menu_id:paidPortion.menuId, name:paidPortion.name, price:paidPortion.price, qty:paidPortion.qty, status:paidPortion.status, added_at:new Date(paidPortion.addedAt).toISOString(), payment_method:sp.method}));
        }
      }
    });
    const totalPaid = sp.lines.reduce((s,l)=> s + l.price*(sp.selections[l.id]||0), 0);
    const methodLabel = sp.method==='cash' ? 'Cash' : 'QRIS';
    splitPayOpen = null;
    render();
    if(sp.mode!=='draft'){
      try{ await Promise.all(dbOps); }catch(e){ reportError(e,'proses pembayaran'); }
    }
    showToast('Pembayaran '+fmtMoney(totalPaid)+' ('+methodLabel+') tercatat');
  }
  function closeTable(tableId){
    const o = order(tableId);
    const tname = tableById(tableId).name;
    const total = itemsTotal(o.items);
    const snapshot = o.items.map(it=>({name:it.name, qty:it.qty, price:it.price, status:it.status, paymentMethod:it.paymentMethod}));
    const methodsUsed = [...new Set(o.items.map(it=>it.paymentMethod).filter(Boolean))];
    const paymentSummary = methodsUsed.length===0 ? null : methodsUsed.length===1 ? methodsUsed[0] : 'mixed';
    const openedAtIso = new Date(o.openedAt || Date.now()).toISOString();
    delete state.orders[tableId];
    openTableId=null;
    render();
    (async ()=>{
      try{
        await sb.from('pos_sales_log').insert({table_id:tableId, table_name:tname, items:snapshot, total:total, payment_method:paymentSummary, opened_at:openedAtIso, closed_at:new Date().toISOString()});
        await sb.from('pos_orders').delete().eq('table_id', tableId);
        showToast('Meja ditutup & direset');
      }catch(e){ reportError(e,'tutup meja'); }
    })();
  }

      }

    });
    canvas.onclick = (ev)=>{
      if(!editMode || ev.target!==canvas) return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.round(((ev.clientX-rect.left)/rect.width)*100);
      const y = Math.round(((ev.clientY-rect.top)/rect.height)*100);
      tableFormOpen = {x,y}; render();
    };
  }

  function makeDraggable(box,t,canvas){
    let dragging=false;
    box.addEventListener('pointerdown',(ev)=>{ dragging=true; box.setPointerCapture(ev.pointerId); });
    box.addEventListener('pointermove',(ev)=>{
      if(!dragging) return;
      const rect = canvas.getBoundingClientRect();
      let x = ((ev.clientX-rect.left)/rect.width)*100;
      let y = ((ev.clientY-rect.top)/rect.height)*100;
      x = Math.max(3, Math.min(97,x)); y = Math.max(5, Math.min(95,y));
      box.style.left=x+'%'; box.style.top=y+'%'; t.x=x; t.y=y;
    });
    box.addEventListener('pointerup', ()=>{ if(dragging){ dragging=false; moveTableCommit(t.id, t.x, t.y); } });
  }

      if(spDraftBtn) spDraftBtn.onclick = ()=>{ openSplitPay('draft', null); };
      const finishBtn = document.getElementById('finishNewBtn');
      if(finishBtn) finishBtn.onclick = finalizeNewOrder;
    } else {
      const spBtn = document.getElementById('splitPayBtn');
      if(spBtn) spBtn.onclick = ()=>{ openSplitPay('existing', openTableId); };
      document.getElementById('finishExistBtn').onclick = ()=>{ openTableId=null; render(); showToast('Pesanan disimpan'); };
      document.getElementById('cancelOrderBtn').onclick = ()=>{
        const tid = openTableId;
        delete state.orders[tid]; openTableId=null; render();
        sb.from('pos_orders').delete().eq('table_id', tid).then(({error})=>{ if(error) reportError(error,'batalkan pesanan'); });
      };
      const closeBtn = document.getElementById('closeTableBtn');
      if(closeBtn) closeBtn.onclick = ()=>{ closeTable(openTableId); };
    }
  }

  function renderConfirmCloseModal(){
    const t = tableById(confirmCloseTableId);
    if(!t){ confirmCloseTableId=null; return; }
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeCC">✕</button>
        <h2>Meja ${t.name} sudah lunas</h2>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">Semua pesanan sudah diantar & dibayar. Pelanggan sudah selesai dari meja ini?</div>
        <div class="modal-actions" style="flex-direction:column;">
          <button class="btn btn-purple" id="ccClose" style="width:100%;margin-bottom:8px;">✓ Selesai, Kosongkan Meja</button>
          <button class="btn btn-line" id="ccDetail" style="width:100%;">+ Tambah / Lihat Pesanan</button>
        </div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeCC').onclick = ()=>{ confirmCloseTableId=null; render(); };
    document.getElementById('ccClose').onclick = ()=>{ const tid=confirmCloseTableId; confirmCloseTableId=null; closeTable(tid); };
    document.getElementById('ccDetail').onclick = ()=>{ openTableId=confirmCloseTableId; confirmCloseTableId=null; render(); };
  }

  function openSplitPay(mode, tableId){
    const items = mode==='draft' ? draftItems : (order(tableId) ? order(tableId).items : []);
    const lines = unpaidLines(items);
    if(lines.length===0) return;
    const selections = {};
    lines.forEach(it=>{ selections[it.id] = it.qty; }); // default: bayar penuh
    splitPayOpen = { mode, tableId, lines: lines.map(it=>({id:it.id, name:it.name, price:it.price, maxQty:it.qty})), selections, method:null };
    render();
  }
  function renderSplitPayModal(){
    const sp = splitPayOpen;
    const total = sp.lines.reduce((s,l)=> s + l.price*(sp.selections[l.id]||0), 0);
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal" style="width:380px;">
        <button class="closeX" id="closeSP">✕</button>
        <h2>Proses Pembayaran</h2>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Atur jumlah yang dibayar customer ini. Sisa qty tetap kebawa belum bayar.</div>
        <div style="max-height:260px;overflow-y:auto;margin-bottom:10px;">
          ${sp.lines.map(l=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);">
              <div style="flex:1;">
                <div style="font-weight:700;font-size:13px;">${l.name}</div>
                <div style="font-size:11px;color:var(--ink-soft);">${fmtMoney(l.price)} / unit · maks ${l.maxQty}</div>
              </div>
              <div class="qtystep" style="width:auto;gap:8px;">
                <button class="qbtn" data-spdec="${l.id}">−</button>
                <span class="qval">${sp.selections[l.id]||0}</span>
                <button class="qbtn add" data-spinc="${l.id}">+</button>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="total-row"><span>Total Dibayar</span><span>${fmtMoney(total)}</span></div>
        <div class="pay-row">
          <button class="${sp.method==='cash'?'sel cash':''}" data-spmethod="cash">💵<br/>Cash</button>
          <button class="${sp.method==='qris'?'sel qris':''}" data-spmethod="qris">📱<br/>QRIS</button>
        </div>
        <button class="btn btn-purple" id="spConfirm" style="width:100%;" ${total<=0 || !sp.method ? 'disabled':''}>✓ Konfirmasi Bayar ${fmtMoney(total)}</button>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeSP').onclick = ()=>{ splitPayOpen=null; render(); };
    overlay.querySelectorAll('[data-spinc]').forEach(b=>{
      b.onclick = ()=>{
        const id=b.dataset.spinc; const line=sp.lines.find(l=>l.id===id);
        sp.selections[id] = Math.min(line.maxQty, (sp.selections[id]||0)+1);
        render();
      };
    });
    overlay.querySelectorAll('[data-spdec]').forEach(b=>{
      b.onclick = ()=>{
        const id=b.dataset.spdec;
        sp.selections[id] = Math.max(0, (sp.selections[id]||0)-1);
        render();
      };
    });
    overlay.querySelectorAll('[data-spmethod]').forEach(b=>{
      b.onclick = ()=>{ sp.method = b.dataset.spmethod; render(); };
    });
    document.getElementById('spConfirm').onclick = async ()=>{
      await processSplitPayment();
    };
  }

  function renderTableFormModal(){
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeTF">✕</button>
        <h2>Meja Baru</h2>
        <div class="formrow"><label>Nama / nomor meja</label><input type="text" id="tfName" placeholder="contoh: C1"/></div>
        <div class="modal-actions"><button class="btn btn-purple" id="tfSave">Simpan</button></div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeTF').onclick = ()=>{ tableFormOpen=null; render(); };
    document.getElementById('tfSave').onclick = ()=>{
      const name = document.getElementById('tfName').value.trim();
      if(!name) return;
      addTable(name, tableFormOpen.x, tableFormOpen.y);
      tableFormOpen=null; render();
    };
  }

  function renderMenuFormModal(){
    const editing = menuFormOpen && menuFormOpen.id;
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeMF">✕</button>
        <h2>${editing?'Edit Menu':'Tambah Menu'}</h2>
        <div class="formrow"><label>Nama item</label><input type="text" id="mfName" value="${editing?menuFormOpen.name:''}"/></div>
        <div class="formrow"><label>Harga (Rp)</label><input type="number" id="mfPrice" value="${editing?menuFormOpen.price:''}"/></div>
        <div class="formrow"><label>Kategori</label><input type="text" id="mfCat" value="${editing?menuFormOpen.cat:''}" placeholder="Minuman / Makanan / Snack"/></div>
        <div class="modal-actions">
          ${editing?'<button class="btn btn-line" id="mfDelete">Hapus</button>':''}
          <button class="btn btn-purple" id="mfSave">Simpan</button>
        </div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeMF').onclick = ()=>{ menuFormOpen=null; render(); };
    document.getElementById('mfSave').onclick = ()=>{
      const name = document.getElementById('mfName').value.trim();
      const price = parseInt(document.getElementById('mfPrice').value)||0;
      const cat = document.getElementById('mfCat').value.trim() || 'Lainnya';
      if(!name) return;
      if(editing) updateMenuItem(menuFormOpen.id, name, price, cat);
      else addMenuItem(name, price, cat);
      menuFormOpen=null; render();
    };
    if(editing){ document.getElementById('mfDelete').onclick = ()=>{ deleteMenuItem(menuFormOpen.id); menuFormOpen=null; render(); }; }
  }

  loadState();
})();
</script>
