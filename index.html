<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atras Coffee — POS</title>
  <link rel="icon" type="image/jpeg" href="atras_logo.jpg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="app"></div>
<style>
:root{
  --bg:#EFF2E7;
  --card:#FFFFFF;
  --purple:#2D5C22;
  --purple-dark:#1D400F;
  --purple-soft:#E2EFD0;
  --ink:#18251A;
  --ink-soft:#677A5E;
  --line:#D2E3BE;
  --green:#3BAA4A;
  --green-soft:#E0F4E3;
  --red:#D94040;
  --red-soft:#FDEAEA;
  --gold:#BF8800;
  --gold-soft:#F8EDD0;
  --shadow:0 4px 16px rgba(20,50,10,0.09);
}
*{box-sizing:border-box;}
#app{
  font-family: 'Poppins', -apple-system, "Segoe UI", Roboto, sans-serif;
  background:var(--bg);
  color:var(--ink);
  width:100%;
  max-width:1240px;
  min-height:720px;
  margin:0 auto;
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
  display:flex;
  flex-direction:column;
  position:relative;
}
.header{
  background:var(--bg);
  border-bottom:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 32px;
  gap:20px;
}
.brand{display:flex;align-items:center;}
.brand-logo{height:44px;width:auto;display:block;}
.navtabs{display:flex;gap:4px;align-items:center;}
.navtabs button{
  border:none;background:none;
  padding:9px 22px;
  font-size:13.5px;
  font-weight:500;
  color:var(--ink);
  border-radius:40px;
  display:flex;align-items:center;gap:7px;
  position:relative;
  cursor:pointer;
  font-family:inherit;
  transition:background .15s,color .15s;
}
.navtabs button:hover:not(.active){background:rgba(45,92,34,0.07);}
.navtabs button.active{color:#fff;background:rgba(45,92,34,0.65);}
.navtabs .badge{
  background:var(--red);color:#fff;font-size:10px;font-weight:500;
  border-radius:20px;padding:1px 7px;
}
.headerright{display:flex;align-items:center;gap:12px;}
.profile{display:flex;align-items:center;gap:10px;}
.profile .av{
  width:42px;height:42px;border-radius:50%;
  overflow:hidden;
  border:2px solid var(--line);
  flex-shrink:0;
}
.profile .av img{width:100%;height:100%;object-fit:cover;display:block;}
.profile .pn{font-size:13px;font-weight:500;line-height:1.2;color:var(--ink);}
.profile .pr{font-size:11px;color:var(--ink-soft);font-weight:500;}

.body{flex:1; padding:18px 24px 22px; overflow-y:auto; position:relative;}
.statsgrid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
  padding:20px 24px; background:var(--bg);
  border-bottom:1px solid var(--line);
}
.statcard{
  background:#fff; border:1px solid var(--line); border-radius:16px;
  padding:18px 18px 14px;
}
.statcard .icobox{
  width:52px; height:52px;
  margin-bottom:14px;
  display:flex; align-items:center; justify-content:center;
}
.statcard .icobox img{
  width:100%; height:100%; object-fit:contain; display:block;
}
.statcard .sc-value{font-size:22px; font-weight:600; color:var(--ink); line-height:1.15;}
.statcard .sc-label{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
.statcard .sc-divider{border-top:1px solid var(--line); margin:14px 0 10px;}
.statcard .sc-compare{display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--ink-soft); gap:8px;}
.statcard .sc-badge{font-size:11px; font-weight:500; padding:3px 9px; border-radius:20px; white-space:nowrap;}
.statcard .sc-badge.up{background:var(--green-soft); color:var(--green);}
.statcard .sc-badge.down{background:var(--red-soft); color:var(--red);}
.statcard .sc-badge.flat{background:var(--line); color:var(--ink-soft);}

.overview-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:18px; align-items:start;}
.panel{background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; flex:1;}
.panel h3{margin:0 0 14px; font-size:14px; font-weight:600; color:var(--ink);}
.barchart{display:flex; align-items:flex-end; gap:6px; height:170px; padding-top:14px;}
.bar-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
.bargroup{display:flex; gap:3px; align-items:flex-end; height:140px;}
.bar{width:13px; border-radius:6px 6px 2px 2px; transition:height .3s;}
.bar.revenue{background:#C8E46A;}
.bar.revenue.today{background:#8ABF1A;}
.bar.txn{background:var(--green-soft);}
.bar.txn.today{background:var(--green);}
.bar-label{font-size:10.5px; color:var(--ink-soft); margin-top:8px; font-weight:600;}
.chart-legend{display:flex; gap:16px; margin-bottom:6px; font-size:11px; color:var(--ink-soft);}
.chart-legend .dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px;}
.toplist-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px;}
.toplist-row:last-child{border-bottom:none;}
.toplist-rank{width:20px; height:20px; border-radius:50%; background:var(--purple-soft); color:var(--purple-dark); font-size:11px; font-weight:600; display:inline-flex; align-items:center; justify-content:center; margin-right:8px;}
.recent-row{display:flex; justify-content:space-between; align-items:flex-start; padding:9px 0; border-bottom:1px solid var(--line); font-size:12.5px; gap:10px;}
.recent-row:last-child{border-bottom:none;}
.paybar{display:flex; height:14px; border-radius:8px; overflow:hidden; margin:6px 0 16px; background:var(--line);}
.paybar .seg.cash{background:var(--green);}
.paybar .seg.qris{background:var(--purple);}
.pay-legend-row{display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:8px 0; border-bottom:1px solid var(--line);}
.pay-legend-row:last-child{border-bottom:none;}
.pay-legend-row .dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:7px;}
.pay-legend-row .pct{color:var(--ink-soft); font-weight:500; margin-left:6px; font-size:11.5px;}
.piechart-outer{position:relative; width:160px; height:160px; flex-shrink:0;}
.piechart-outer .pie{width:100%; height:100%; border-radius:50%;}
.piechart-outer .hole{position:absolute; top:50%; left:50%; width:64%; height:64%; background:#fff; border-radius:50%; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
.piechart-outer .h-val{font-size:14px; font-weight:600; color:var(--ink); line-height:1.2;}
.piechart-outer .h-lbl{font-size:10px; color:var(--ink-soft); margin-top:2px;}

.orderlist-table{width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; border:1px solid var(--line);}
.orderlist-table th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft); padding:12px 16px; border-bottom:1px solid var(--line); background:#FAFAFD; white-space:nowrap;}
.orderlist-table td{padding:12px 16px; font-size:13px; border-bottom:1px solid var(--line); color:var(--ink); white-space:nowrap;}
.orderlist-table tr:last-child td{border-bottom:none;}
.status-badge2{font-size:10.5px; font-weight:500; padding:5px 12px; border-radius:20px; display:inline-block;}
.status-badge2.pending{background:#E5EBFF; color:#3D5AFE;}
.status-badge2.belum_bayar{background:var(--gold-soft); color:var(--gold);}
.status-badge2.lunas{background:var(--green-soft); color:var(--green);}

.toolrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;}
.toolrow .hint{font-size:13px;color:var(--ink-soft);}
.toolrow .right-tools{display:flex;gap:8px;}
.btn{
  border:none;border-radius:11px;padding:9px 16px;
  font-size:13px;font-weight:500;cursor:pointer;
}
.btn-purple{background:var(--purple); color:#fff;}
.btn-purple:disabled{background:#D8D3F6;cursor:not-allowed;}
.btn-ghost{background:var(--purple-soft); color:var(--purple-dark);}
.btn-line{background:#fff;border:1px solid var(--line); color:var(--ink-soft);}
.btn-soft-red{background:var(--red-soft);color:var(--red);}
.btn-soft-green{background:var(--green-soft);color:var(--green);}

.canvas{
  position:relative;
  width:100%;
  height:500px;
  background:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 44px 44px;
  background-color: var(--card);
  border-radius:16px;
  border:1px solid var(--line);
  overflow:hidden;
}
.table-box{
  position:absolute;
  width:88px;height:88px;
  border-radius:14px;
  background:#fff;
  border:2px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transform:translate(-50%,-50%);
  touch-action:none; user-select:none;
  box-shadow:var(--shadow);
  color:var(--ink-soft);
}
.table-box .topstrip{
  position:absolute; top:-2px; left:8px; right:8px; height:5px; border-radius:0 0 4px 4px;
}
.table-box .name{font-weight:600;font-size:15px;}
.table-box .meta{font-size:10px;margin-top:3px;font-weight:500;text-align:center;padding:0 4px;}
.table-box.pending{ background:var(--red); border-color:var(--red); color:#fff; }
.table-box.unpaid{ background:var(--gold); border-color:var(--gold); color:#fff; }
.table-box.done{ background:var(--green); border-color:var(--green); color:#fff; }
.table-box .del{
  position:absolute;top:-8px;right:-8px;width:21px;height:21px;border-radius:50%;
  background:var(--ink);color:#fff;font-size:12px;
  display:flex;align-items:center;justify-content:center;
}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--ink-soft);}
.legend span{display:flex;align-items:center;gap:6px;}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

.chiprow{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;position:sticky;top:0;z-index:5;background:var(--bg);padding-top:2px;}
.chip{
  flex:0 0 auto;
  background:#fff;border:1px solid var(--line);
  border-radius:13px;padding:10px 16px;
  font-size:12.5px;font-weight:500;color:var(--ink-soft);
  text-align:center;min-width:88px;cursor:pointer;
}
.chip.active{background:var(--purple-soft); border-color:var(--purple); color:var(--purple-dark);}

.searchbar{
  display:flex; align-items:center; gap:8px;
  background:#fff;border:1px solid var(--line); border-radius:12px;
  padding:10px 14px; margin-bottom:14px; max-width:340px;
}
.searchbar input{border:none;outline:none;font-size:13px;width:100%;background:transparent;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
  gap:14px;
}
.fcard{
  background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:12px; box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;
}
.fcard .icowrap{
  width:100%; height:64px; border-radius:10px;
  background:var(--purple-soft);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.fcard .fnm{font-weight:600;font-size:13px;line-height:1.25;min-height:34px;}
.fcard .fpr{font-weight:600;font-size:13.5px;}
.fcard .availbadge{
  align-self:flex-start;
  font-size:10px;font-weight:500;
  border-radius:8px;padding:2px 8px;
}
.fcard .availbadge.av{background:var(--green-soft);color:var(--green);}
.fcard .qtystep{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.qbtn{
  width:28px;height:28px;border-radius:9px;border:none;
  background:var(--purple-soft); color:var(--purple-dark); font-weight:600;font-size:15px;
}
.qbtn.add{background:var(--purple);color:#fff;}
.qval{font-weight:600;font-size:14px;}

.orderscreen{
  position:absolute; inset:0; background:var(--bg);
  display:flex; z-index:40;
}
.ordermain{flex:1; padding:18px 20px; overflow-y:auto;}
.ordercart{
  width:340px; flex:0 0 340px; background:#fff;
  border-left:1px solid var(--line);
  display:flex; flex-direction:column;
  padding:18px 18px 16px;
  overflow-y:auto;
}
.backrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.backbtn{
  border:1px solid var(--line); background:#fff; border-radius:10px;
  padding:7px 12px; font-size:13px;font-weight:500;color:var(--ink-soft);
}
.stepbadge{
  font-size:10.5px;font-weight:600;color:var(--purple-dark);background:var(--purple-soft);
  border-radius:8px;padding:3px 9px;
}
.cart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.cart-head h3{margin:0;font-size:16px;}
.cart-list{margin:8px 0; max-height:220px; overflow-y:auto; flex-shrink:0;}
.cart-item{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:9px 0;border-bottom:1px solid var(--line);
}
.cart-item .nm{font-weight:500;font-size:13px;}
.cart-item .sub{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}
.status-pill{
  font-size:10.5px;font-weight:500;padding:5px 10px;border-radius:20px;border:none;white-space:nowrap;
}
.status-pill.pending{background:var(--red-soft); color:var(--red);}
.status-pill.served{background:var(--green-soft); color:var(--green);}
.cart-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.rm-x{color:var(--ink-soft);font-size:11px;cursor:pointer;}
.cart-empty{color:var(--ink-soft);font-size:12.5px;text-align:center;padding:20px 0;}
.total-row{display:flex;justify-content:space-between;font-weight:600;font-size:15px;padding:9px 0 8px;border-top:1px solid var(--line);}
.section-label{font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin:10px 0 7px;}
.pay-row{display:flex;gap:7px;margin-bottom:8px;}
.pay-row button{
  flex:1;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:500;
  border:1px solid var(--line);background:#fff;color:var(--ink-soft);
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.pay-row button.sel.belum{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
.pay-row button.sel.cash{background:var(--green-soft);border-color:var(--green);color:var(--green);}
.pay-row button.sel.qris{background:var(--purple-soft);border-color:var(--purple);color:var(--purple-dark);}

.tablepick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:6px;}
.tablepick{
  position:relative;
  border-radius:10px; border:2px solid var(--line); background:#fff;
  padding:9px 4px; text-align:center; font-size:12px; font-weight:600; color:var(--ink-soft);
}
.tablepick .swatch{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.tablepick.sel{border-color:var(--purple); background:var(--purple-soft); color:var(--purple-dark);}
.tablepick.occupied{opacity:.4; cursor:not-allowed;}
.tablepick .occ-tag{display:block;font-size:9px;font-weight:500;color:var(--red);margin-top:1px;}

.pending-group{
  border-radius:14px; border:1px solid var(--line); background:#fff;
  margin-bottom:14px; overflow:hidden; box-shadow:var(--shadow);
}
.pending-group .ghead{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px; color:#fff; font-weight:600; font-size:13.5px;
}
.pending-group .gbody{padding:4px 16px 6px;}
.pending-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0; border-bottom:1px solid var(--line);
}
.pending-row:last-child{border-bottom:none;}
.pending-row .nm{font-weight:500;font-size:13.5px;}
.pending-row .wait{font-size:11px;color:var(--ink-soft);margin-top:1px;}
.empty-state{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:60px 10px;}

.menurow{
  background:#fff;border:1px solid var(--line);border-radius:13px;
  padding:12px 16px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;
}
.menurow .nm{font-weight:600;font-size:14px;}
.menurow .cat{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.menurow .pr{font-weight:500;font-size:13px;color:var(--ink-soft);margin-right:10px;}

.overlay{position:fixed;inset:0;background:rgba(35,38,58,0.45);display:flex;align-items:center;justify-content:center;z-index:60;}
.modal{background:#fff;border-radius:16px;padding:20px 22px;width:340px;}
.modal h2{margin:0 0 12px;font-size:16px;}
.formrow{margin-bottom:11px;}
.formrow label{font-size:11.5px;font-weight:500;color:var(--ink-soft);display:block;margin-bottom:4px;}
.formrow input{
  width:100%;padding:9px 10px;border-radius:9px;border:1px solid var(--line);
  font-size:13.5px;background:#FAFAFD;color:var(--ink);
}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-actions .btn{flex:1;}
.closeX{
  background:var(--bg);border:none;border-radius:50%;width:28px;height:28px;font-size:13px;color:var(--ink-soft);
  float:right;
}
.toast{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:12.5px;
  z-index:90;opacity:0;transition:opacity .25s; white-space:nowrap;
}
.toast.show{opacity:1;}

.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:16px;font-size:12.5px;font-weight:600;color:var(--ink-soft);}
.filter-presets{display:flex;gap:6px;}
.filter-presets button{border:none;border-radius:9px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;background:var(--purple-soft);color:var(--purple-dark);transition:all .15s;}
.filter-presets button.sel{background:var(--purple);color:#fff;}
.filter-custom{display:flex;align-items:center;gap:6px;margin-left:auto;flex-wrap:wrap;}
.filter-custom input[type=date]{border:1px solid var(--line);border-radius:9px;padding:5px 9px;font-size:12px;color:var(--ink);background:#FAFAFD;}
.filter-apply{border:none;border-radius:9px;padding:6px 14px;font-size:12.5px;font-weight:500;cursor:pointer;background:var(--purple);color:#fff;}
.tb-section-head{font-size:11px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 5px;}
.tbrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px;}
.tbrow:last-child{border-bottom:none;}
.tbrank{width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:7px;}
.tbrank.top{background:var(--green-soft);color:var(--green);}
.tbrank.bot{background:var(--red-soft);color:var(--red);}
.barchart-outer{overflow-x:auto;padding-bottom:4px;}
.barchart-inner{display:flex;align-items:flex-end;gap:5px;height:160px;padding-top:12px;min-width:max-content;}
.bar-col2{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:26px;}
.orderlist-scroll-wrap{max-height:378px;overflow-y:auto;border-radius:14px;border:1px solid var(--line);}
.orderlist-scroll-wrap .orderlist-table{border:none;border-radius:0;}
.section-sep{height:1px;background:var(--line);margin:8px 0;}

/* Period dropdown */
.period-dropdown{position:relative;display:inline-block;z-index:20;}
.pd-trigger{
  display:flex;align-items:center;justify-content:space-between;gap:48px;
  background:#fff;border-radius:14px;padding:13px 18px;
  cursor:pointer;font-weight:600;font-size:14px;color:var(--ink);
  border:1px solid var(--line);min-width:220px;
  box-shadow:var(--shadow);user-select:none;
}
.pd-trigger svg{transition:transform .2s;flex-shrink:0;}
.pd-trigger.open svg{transform:rotate(180deg);}
.pd-menu{
  position:absolute;top:calc(100% + 8px);left:0;
  background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:6px;box-shadow:0 8px 28px rgba(20,50,10,0.13);min-width:240px;
  display:none;
}
.pd-menu.open{display:block;}
.pd-option{
  padding:10px 14px;border-radius:10px;font-size:13.5px;font-weight:600;
  color:var(--ink);cursor:pointer;font-family:inherit;
}
.pd-option:hover{background:var(--bg);}
.pd-option.active{background:var(--purple-soft);color:var(--purple-dark);}
.custom-range{
  display:flex;align-items:center;gap:8px;
  background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:10px 16px;box-shadow:var(--shadow);
}
.custom-range input[type=date]{
  border:none;outline:none;font-size:13px;color:var(--ink);
  background:transparent;font-family:inherit;cursor:pointer;
}
.cr-sep{color:var(--ink-soft);font-size:13px;flex-shrink:0;}
.cr-apply{
  border:none;border-radius:9px;padding:6px 14px;
  font-size:13px;font-weight:500;cursor:pointer;
  background:var(--purple);color:#fff;
  font-family:inherit;white-space:nowrap;margin-left:4px;
}

/* Order list toolbar */
.ol-toolbar{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.ol-tabs{display:flex;gap:4px;overflow-x:auto;flex:1;min-width:0;}
.ol-tabs::-webkit-scrollbar{display:none;}
.ol-tabs button{
  border:none;background:none;white-space:nowrap;cursor:pointer;
  padding:8px 14px;font-size:12.5px;font-weight:500;color:var(--ink-soft);
  border-bottom:2px solid transparent;font-family:inherit;
  transition:color .15s,border-color .15s;
}
.ol-tabs button:hover{color:var(--ink);}
.ol-tabs button.sel{color:var(--ink);font-weight:600;border-bottom-color:var(--purple);}
.ol-export{
  border:none;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:500;
  background:var(--purple);color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:background .15s;
}
.ol-export:hover{background:var(--purple-dark);}

/* User switcher */
.user-option{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:12px;border:1.5px solid var(--line);
  cursor:pointer;transition:border-color .15s,background .15s;
}
.user-option:hover{border-color:var(--purple);background:var(--purple-soft);}
.user-option.sel{border-color:var(--purple);background:var(--purple-soft);}
.user-option .uav{
  width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:var(--purple-soft);display:flex;align-items:center;justify-content:center;font-size:20px;
}
.user-option .uav img{width:100%;height:100%;object-fit:cover;display:block;}
.user-check{margin-left:auto;color:var(--purple);font-size:16px;font-weight:600;}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){

  const PALETTE = ['#2D5C22','#D4782A','#1A7A6A','#BF8800','#4A8C35','#C05030','#3B8A50','#7A5820','#2A5A8A','#8A3A5A','#5C8A25','#3A6B1A'];

  const SUPABASE_URL = 'https://vchqvbnkhssauuxyxaoa.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_LHs-GJfbb8vmNebtWtI2tA_Ln_biOqR';
  let sb = null;
  let dbReady = false;
  let dbErrorMsg = '';
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }catch(e){
    dbErrorMsg = 'Library Supabase gagal dimuat. Buka file ini di luar Claude (misal lewat Vercel) supaya bisa konek ke database.';
  }

  let state = { tables: [], menu: [], orders: {}, categories: [], todaySales: [], yesterdaySales: [], last10DaysSales: [], recentClosed: [], filteredSales: [] };

  const _now = new Date();
  let filterStart = new Date(_now.getFullYear(), _now.getMonth(), 1);
  let filterEnd   = new Date(_now.getFullYear(), _now.getMonth() + 1, 0);
  let filterPreset = 'month'; // 'today' | '7d' | 'month' | 'custom'

  let view = 'map';
  let editMode = false;
  let openTableId = null;
  let confirmCloseTableId = null;
  let splitPayOpen = null; // {tableId, selections:{itemId:qty}, method}
  let newOrderActive = false;
  let draftItems = [];
  let draftTableId = null;
  let referralMode = false;
  let noteEditFor = null; // {scope:'draft'|'existing', tableId, itemId}
  let categoryReorderMode = false;
  let orderListSortAsc = false;
  let orderSearch = '';
  let orderCatFilter = 'Semua';
  let ovCatFilter = 'Semua';
  let ovSearch = '';
  let activeUserName = 'Pendi';
  let activeUserPhoto = 'Pendi Photos.png';
  let userSwitcherOpen = false;
  let menuCatFilter = 'Semua';
  let menuFormOpen = null;
  let tableFormOpen = null;
  let moveTableFrom = null;
  let toastTimer = null;
  const REFERRAL_CATS = ['Kopi Susu','Coffee Mocktails','Milk Based','Refreshments'];
  const REFERRAL_PRICE = 10000;

  function showToast(msg){
    const t = document.getElementById('toastEl');
    if(t){ t.textContent = msg; t.classList.add('show'); }
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ const el=document.getElementById('toastEl'); if(el) el.classList.remove('show'); }, 1700);
  }
  function reportError(err, label){
    console.error(label, err);
    showToast('Gagal sync ke database ('+label+')');
  }
  function effectivePrice(m){
    return (referralMode && REFERRAL_CATS.includes(m.cat)) ? REFERRAL_PRICE : m.price;
  }
  function orderedCategories(){
    const fromDb = state.categories.map(c=>c.name);
    const fromMenu = [...new Set(state.menu.map(m=>m.cat))];
    const merged = [...fromDb];
    fromMenu.forEach(c=>{ if(!merged.includes(c)) merged.push(c); });
    return merged;
  }
  function todayStartMs(){
    const d = new Date(); d.setHours(0,0,0,0); return d.getTime();
  }
  function liveRevenueFromActiveOrders(){
    const start = todayStartMs();
    let sum = 0;
    Object.values(state.orders).forEach(o=>{
      if(o.openedAt < start) return; // dibuka hari sebelumnya, bukan omzet hari ini
      o.items.forEach(it=>{
        if(it.status==='served' && it.paymentMethod) sum += it.price*it.qty;
      });
    });
    return sum;
  }
  function liveServedPaidQty(){
    const start = todayStartMs();
    let n = 0;
    Object.values(state.orders).forEach(o=>{
      if(o.openedAt < start) return;
      o.items.forEach(it=>{ if(it.status==='served' && it.paymentMethod) n += it.qty; });
    });
    return n;
  }
  function periodSummaryFromLogs(logs){
    const revenue = logs.reduce((s,x)=>s+x.total,0);
    const items = logs.reduce((s,x)=> s + (x.items||[]).reduce((s2,it)=>s2+(it.qty||0),0), 0);
    const closedCount = logs.length;
    const avg = closedCount ? Math.round(revenue/closedCount) : 0;
    return { revenue, items, closedCount, avg };
  }
  function todaySummary(){
    const closed = periodSummaryFromLogs(state.todaySales);
    const revenue = closed.revenue + liveRevenueFromActiveOrders();
    const items = closed.items + liveServedPaidQty();
    const closedCount = closed.closedCount;
    const avg = closedCount ? Math.round(revenue/closedCount) : revenue;
    return { revenue, items, closedCount, avg };
  }
  function yesterdaySummary(){
    return periodSummaryFromLogs(state.yesterdaySales);
  }
  function pctChange(today, yesterday){
    if(yesterday===0) return today===0 ? {pct:0, dir:'flat'} : {pct:null, dir:'up'};
    const pct = Math.round(((today-yesterday)/yesterday)*100);
    return { pct, dir: pct>0?'up':pct<0?'down':'flat' };
  }
  function dailyStatsLast10Days(){
    const start = todayStartMs();
    const days = [];
    for(let i=9;i>=0;i--){
      const dayStart = start - i*24*3600*1000;
      const dayEnd = dayStart + 24*3600*1000;
      const dayRows = state.last10DaysSales.filter(r=>{ const t=new Date(r.openedAt).getTime(); return t>=dayStart && t<dayEnd; });
      const closedRevenue = dayRows.reduce((s,r)=>s+r.total,0);
      const isToday = i===0;
      const total = closedRevenue + (isToday ? liveRevenueFromActiveOrders() : 0);
      const count = dayRows.length;
      days.push({ label: new Date(dayStart).toLocaleDateString('id-ID', {weekday:'short'}), total, count, isToday });
    }
    return days;
  }
  function paymentBreakdownToday(){
    let cash = 0, qris = 0;
    state.todaySales.forEach(s=>{
      (s.items||[]).forEach(it=>{
        if(it.paymentMethod==='cash') cash += it.price*it.qty;
        else if(it.paymentMethod==='qris') qris += it.price*it.qty;
      });
    });
    const start = todayStartMs();
    Object.values(state.orders).forEach(o=>{
      if(o.openedAt < start) return;
      o.items.forEach(it=>{
        if(it.status!=='served') return;
        if(it.paymentMethod==='cash') cash += it.price*it.qty;
        else if(it.paymentMethod==='qris') qris += it.price*it.qty;
      });
    });
    return { cash, qris };
  }
  function topItemsToday(){
    const counts = {};
    const addItems = (items)=>{
      items.forEach(it=>{
        if(!(it.status==='served' && it.paymentMethod)) return;
        counts[it.name] = (counts[it.name]||0) + it.qty;
      });
    };
    state.todaySales.forEach(s=> addItems(s.items||[]));
    const start = todayStartMs();
    Object.values(state.orders).forEach(o=>{
      if(o.openedAt < start) return;
      addItems(o.items);
    });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  }

  // ---------- filter helpers ----------
  function toDateInput(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }
  function parseDateInput(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  function fmtK(n){ return n>=1000000 ? (n/1000000).toFixed(1).replace('.0','')+' jt' : Math.round(n/1000)+'K'; }
  function isTodayInFilter(){
    const t=new Date(); t.setHours(0,0,0,0);
    const ms=t.getTime();
    return filterStart.getTime()<=ms && filterEnd.getTime()>=ms;
  }
  function applyFilterPreset(preset){
    filterPreset=preset;
    const now=new Date();
    if(preset==='today'){
      filterStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      filterEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    } else if(preset==='7d'){
      filterEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      filterStart=new Date(filterEnd.getTime()-6*24*3600*1000);
    } else if(preset==='month'){
      filterStart=new Date(now.getFullYear(),now.getMonth(),1);
      filterEnd=new Date(now.getFullYear(),now.getMonth()+1,0);
    }
  }
  async function loadFilteredData(){
    if(!sb) return;
    try{
      const start=new Date(filterStart); start.setHours(0,0,0,0);
      const end=new Date(filterEnd); end.setHours(23,59,59,999);
      const {data:sales,error}=await sb.from('pos_sales_log')
        .select('table_name,total,closed_at,items,opened_at,payment_method')
        .gte('opened_at', start.toISOString())
        .lte('opened_at', end.toISOString())
        .order('opened_at',{ascending:true});
      if(error) throw error;
      state.filteredSales=(sales||[]).map(s=>({
        total:s.total, openedAt:s.opened_at, closedAt:s.closed_at,
        tableName:s.table_name, items:s.items||[], paymentMethod:s.payment_method
      }));
    }catch(e){ reportError(e,'filter data'); }
  }
  function filteredSummary(){
    const sales=state.filteredSales||[];
    let rev=sales.reduce((s,x)=>s+x.total,0);
    let items=sales.reduce((s,x)=>s+(x.items||[]).reduce((s2,it)=>(it.price||0)>0?s2+(it.qty||0):s2,0),0);
    const count=sales.length;
    if(isTodayInFilter()){
      rev+=liveRevenueFromActiveOrders();
      const start=todayStartMs();
      Object.values(state.orders).forEach(o=>{
        if(o.openedAt<start) return;
        o.items.forEach(it=>{ if(it.status==='served'&&it.paymentMethod&&it.price>0) items+=it.qty; });
      });
    }
    return {revenue:rev,items,closedCount:count,avg:count?Math.round(rev/count):rev};
  }
  function dailyStatsFiltered(){
    const map={};
    (state.filteredSales||[]).forEach(s=>{
      const d=new Date(s.openedAt||s.closedAt);
      const key=toDateInput(d);
      if(!map[key]) map[key]={total:0,count:0,dateObj:new Date(d.getFullYear(),d.getMonth(),d.getDate())};
      map[key].total+=s.total; map[key].count++;
    });
    if(isTodayInFilter()){
      const tk=toDateInput(new Date());
      if(!map[tk]) map[tk]={total:0,count:0,dateObj:new Date(),isToday:true};
      map[tk].total+=liveRevenueFromActiveOrders(); map[tk].isToday=true;
    }
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([key,d])=>({
      key, isToday:d.isToday||false,
      label:d.dateObj.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'}),
      shortLabel:d.dateObj.toLocaleDateString('id-ID',{day:'numeric',month:'short'}),
      total:d.total, count:d.count
    }));
  }
  function topBottomDays(){
    const days=dailyStatsFiltered().filter(d=>d.total>0);
    const sorted=[...days].sort((a,b)=>b.total-a.total);
    return {top:sorted[0]||null, bot:sorted[sorted.length-1]||null};
  }
  function last7DailyStats(){
    const start=todayStartMs();
    const days=[];
    for(let i=6;i>=0;i--){
      const dayStart=start-i*24*3600*1000;
      const dayEnd=dayStart+24*3600*1000;
      const rows=state.last10DaysSales.filter(r=>{const t=new Date(r.openedAt).getTime();return t>=dayStart&&t<dayEnd;});
      const closed=rows.reduce((s,r)=>s+r.total,0);
      const isToday=i===0;
      const total=closed+(isToday?liveRevenueFromActiveOrders():0);
      const date=new Date(dayStart);
      days.push({total,isToday,label:date.toLocaleDateString('id-ID',{day:'numeric',month:'short'})});
    }
    return days;
  }
  function topItemsFiltered(){
    const counts={};
    (state.filteredSales||[]).forEach(s=>{
      (s.items||[]).forEach(it=>{
        if(!it.paymentMethod||(it.price||0)<=0) return;
        counts[it.name]=(counts[it.name]||0)+(it.qty||0);
      });
    });
    if(isTodayInFilter()){
      const start=todayStartMs();
      Object.values(state.orders).forEach(o=>{
        if(o.openedAt<start) return;
        o.items.forEach(it=>{ if(it.status==='served'&&it.paymentMethod&&it.price>0) counts[it.name]=(counts[it.name]||0)+it.qty; });
      });
    }
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  }
  function paymentBreakdownFiltered(){
    let cash=0,qris=0;
    (state.filteredSales||[]).forEach(s=>{
      (s.items||[]).forEach(it=>{
        if(it.paymentMethod==='cash') cash+=it.price*(it.qty||0);
        else if(it.paymentMethod==='qris') qris+=it.price*(it.qty||0);
      });
    });
    if(isTodayInFilter()){
      const start=todayStartMs();
      Object.values(state.orders).forEach(o=>{
        if(o.openedAt<start) return;
        o.items.forEach(it=>{
          if(it.status!=='served') return;
          if(it.paymentMethod==='cash') cash+=it.price*it.qty;
          else if(it.paymentMethod==='qris') qris+=it.price*it.qty;
        });
      });
    }
    return {cash,qris};
  }
  function buildFilteredOrderRows(){
    const rows=[];
    const startMs=filterStart.getTime();
    const endMs=filterEnd.getTime()+24*3600*1000;
    (state.filteredSales||[]).forEach(s=>{
      const t=new Date(s.openedAt||s.closedAt).getTime();
      (s.items||[]).forEach(it=>{
        if((it.price||0)<=0) return;
        rows.push({time:t,table:s.tableName||'-',name:it.name,qty:it.qty||0,status:'lunas',subtotal:it.price*(it.qty||0)});
      });
    });
    if(isTodayInFilter()){
      Object.keys(state.orders).forEach(tid=>{
        const o=state.orders[tid];
        if(o.openedAt<startMs||o.openedAt>=endMs) return;
        const tname=tableById(tid)?tableById(tid).name:'?';
        o.items.forEach(it=>{
          if(it.price<=0) return;
          rows.push({time:it.addedAt,table:tname,name:it.name,qty:it.qty,
            status:it.status==='pending'?'pending':(it.paymentMethod?'lunas':'belum_bayar'),
            subtotal:it.price*it.qty});
        });
      });
    }
    rows.sort((a,b)=>orderListSortAsc?a.time-b.time:b.time-a.time);
    return rows;
  }

  // ---------- load from Supabase ----------
  async function loadState(){
    if(!sb){ render(); return; }
    try{
      const todayStart = new Date(); todayStart.setHours(0,0,0,0);
      const yStart = new Date(todayStart.getTime() - 24*3600*1000);
      const tenDayStart = new Date(todayStart.getTime() - 9*24*3600*1000);
      const [{data:tables,error:e1}, {data:menu,error:e2}, {data:orders,error:e3}, {data:items,error:e4}, {data:cats,error:e5}, {data:salesToday,error:e6}, {data:salesYesterday,error:e7}, {data:sales10d,error:e8}, {data:recent,error:e9}] = await Promise.all([
        sb.from('pos_tables').select('*'),
        sb.from('pos_menu').select('*'),
        sb.from('pos_orders').select('*'),
        sb.from('pos_order_items').select('*'),
        sb.from('pos_categories').select('*').order('sort_order', {ascending:true}),
        sb.from('pos_sales_log').select('table_name,total,closed_at,items,opened_at').gte('opened_at', todayStart.toISOString()),
        sb.from('pos_sales_log').select('total,items,opened_at').gte('opened_at', yStart.toISOString()).lt('opened_at', todayStart.toISOString()),
        sb.from('pos_sales_log').select('total,opened_at').gte('opened_at', tenDayStart.toISOString()),
        sb.from('pos_sales_log').select('table_name,total,payment_method,closed_at').order('closed_at', {ascending:false}).limit(10)
      ]);
      if(e1||e2||e3||e4) throw (e1||e2||e3||e4);
      state.tables = (tables||[]).map(t=>({id:t.id, name:t.name, x:Number(t.x), y:Number(t.y)}));
      state.menu = (menu||[]).map(m=>({id:m.id, name:m.name, price:m.price, cat:m.category}));
      state.categories = (cats||[]).map(c=>({name:c.name, sortOrder:c.sort_order}));
      state.todaySales = (salesToday||[]).map(s=>({total:s.total, closedAt:s.closed_at, items:s.items||[], tableName:s.table_name}));
      state.yesterdaySales = (salesYesterday||[]).map(s=>({total:s.total, items:s.items||[]}));
      state.last10DaysSales = (sales10d||[]).map(s=>({total:s.total, openedAt:s.opened_at}));
      state.recentClosed = (recent||[]).map(s=>({tableName:s.table_name, total:s.total, paymentMethod:s.payment_method, closedAt:s.closed_at}));
      state.orders = {};
      (orders||[]).forEach(o=>{ state.orders[o.table_id] = {items:[], openedAt: o.created_at ? new Date(o.created_at).getTime() : Date.now()}; });
      (items||[]).forEach(it=>{
        if(!state.orders[it.table_id]) state.orders[it.table_id] = {items:[], openedAt:Date.now()};
        state.orders[it.table_id].items.push({
          id: it.id, menuId: it.menu_id, name: it.name, price: it.price, qty: it.qty,
          status: it.status, addedAt: new Date(it.added_at).getTime(), paymentMethod: it.payment_method || null,
          note: it.note || ''
        });
      });
      dbReady = true;
      await loadFilteredData();
    }catch(e){
      dbErrorMsg = 'Gagal mengambil data dari Supabase. Cek koneksi internet atau jalankan file ini lewat hosting (Vercel), bukan dari dalam Claude.';
      console.error(e);
    }
    render();
  }

  function order(tableId){ return state.orders[tableId]; }
  function ensureOrderLocal(tableId){ if(!state.orders[tableId]) state.orders[tableId]={items:[],openedAt:Date.now()}; return state.orders[tableId]; }
  function tableById(id){ return state.tables.find(t=>t.id===id); }
  function tableColor(tableId){
    const idx = state.tables.findIndex(t=>t.id===tableId);
    return PALETTE[(idx<0?0:idx) % PALETTE.length];
  }
  function fmtMoney(n){ return 'Rp' + n.toLocaleString('id-ID'); }
  function itemsTotal(items){ return items.reduce((s,it)=>s+it.price*it.qty,0); }
  function timeAgo(ts){
    const mins = Math.floor((Date.now()-ts)/60000);
    if(mins<1) return 'baru saja';
    if(mins===1) return '1 menit lalu';
    return mins+' menit lalu';
  }
  function tableStatus(tableId){
    const o = order(tableId);
    if(!o || o.items.length===0) return 'empty';
    if(o.items.some(it=>it.status==='pending')) return 'pending';
    if(o.items.some(it=>!it.paymentMethod)) return 'unpaid';
    return 'done';
  }
  function paymentBreakdown(items){
    const out = {cash:0, qris:0, belum:0};
    items.forEach(it=>{
      const sub = it.price*it.qty;
      if(it.paymentMethod==='cash') out.cash += sub;
      else if(it.paymentMethod==='qris') out.qris += sub;
      else out.belum += sub;
    });
    return out;
  }
  function tableMetaLabel(items){
    const b = paymentBreakdown(items);
    const parts = [];
    if(b.cash>0) parts.push('Cash');
    if(b.qris>0) parts.push('QRIS');
    if(b.belum>0) parts.push(parts.length?'+blm bayar':'Belum Bayar');
    return parts.join(' ') || 'Lunas';
  }
  function allPendingGroups(){
    let groups = [];
    Object.keys(state.orders).forEach(tid=>{
      const pend = state.orders[tid].items.filter(it=>it.status==='pending');
      if(pend.length===0) return;
      pend.sort((a,b)=>a.addedAt-b.addedAt);
      groups.push({ tableId:tid, tableName: tableById(tid)?tableById(tid).name:'?', items:pend, earliest: pend[0].addedAt });
    });
    groups.sort((a,b)=>a.earliest-b.earliest);
    return groups;
  }
  function pendingCountTotal(){
    return Object.values(state.orders).reduce((s,o)=>s+o.items.filter(i=>i.status==='pending').reduce((s2,i)=>s2+i.qty,0),0);
  }
  function displayQtyFor(items, menuId){ return items.filter(it=>it.menuId===menuId).reduce((s,it)=>s+it.qty,0); }

  function applyIncrement(items, m, price){
    const useprice = price!=null ? price : m.price;
    let target=null;
    for(let i=items.length-1;i>=0;i--){ if(items[i].menuId===m.id && items[i].price===useprice && items[i].status==='pending' && !items[i].paymentMethod){ target=items[i]; break; } }
    if(target){ target.qty += 1; return {mode:'update', item:target}; }
    const newItem = {id:'it'+Date.now()+Math.random().toString(36).slice(2,6), menuId:m.id, name:m.name, price:useprice, qty:1, status:'pending', addedAt:Date.now(), paymentMethod:null, note:''};
    items.push(newItem);
    return {mode:'insert', item:newItem};
  }
  function applyDecrement(items, m, price){
    const useprice = price!=null ? price : m.price;
    let idx=-1;
    for(let i=items.length-1;i>=0;i--){ if(items[i].menuId===m.id && items[i].price===useprice && items[i].status==='pending' && !items[i].paymentMethod){ idx=i; break; } }
    if(idx===-1) return null;
    if(items[idx].qty>1){ items[idx].qty -=1; return {mode:'update', item:items[idx]}; }
    const removed = items[idx];
    items.splice(idx,1);
    return {mode:'delete', item:removed};
  }

      }catch(e){ reportError(e,'tambah item'); }
    })();

  function itemsRefFor(sp){
    return sp.mode==='draft' ? draftItems : (order(sp.tableId) ? order(sp.tableId).items : []);

  async function processSplitPayment(){
    const sp = splitPayOpen; if(!sp) return;
    const items = itemsRefFor(sp);
    const dbOps = [];
    sp.lines.forEach(l=>{
      const qty = sp.selections[l.id]||0;
      if(qty<=0) return;
      const item = items.find(i=>i.id===l.id);
      if(!item) return;
      if(qty>=item.qty){
        item.paymentMethod = sp.method;
        if(sp.mode!=='draft') dbOps.push(sb.from('pos_order_items').update({payment_method:sp.method}).eq('id', item.id));
      } else {
        item.qty -= qty;
        const paidPortion = {
          id:'it'+Date.now()+Math.random().toString(36).slice(2,6),
          menuId:item.menuId, name:item.name, price:item.price, qty:qty,
          status:item.status, addedAt:item.addedAt, paymentMethod:sp.method, note:item.note||''
        };
        items.push(paidPortion);
        if(sp.mode!=='draft'){
          dbOps.push(sb.from('pos_order_items').update({qty:item.qty}).eq('id', item.id));
          dbOps.push(sb.from('pos_order_items').insert({id:paidPortion.id, table_id:sp.tableId, menu_id:paidPortion.menuId, name:paidPortion.name, price:paidPortion.price, qty:paidPortion.qty, status:paidPortion.status, added_at:new Date(paidPortion.addedAt).toISOString(), payment_method:sp.method, note:paidPortion.note||null}));
        }
      }
    });
    const totalPaid = sp.lines.reduce((s,l)=> s + l.price*(sp.selections[l.id]||0), 0);
    const methodLabel = sp.method==='cash' ? 'Cash' : 'QRIS';
    splitPayOpen = null;
    render();
    if(sp.mode!=='draft'){
      try{ await Promise.all(dbOps); }catch(e){ reportError(e,'proses pembayaran'); }
    }
    showToast('Pembayaran '+fmtMoney(totalPaid)+' ('+methodLabel+') tercatat');
  }
  function closeTable(tableId){
    const o = order(tableId);
    const tname = tableById(tableId).name;
    const total = itemsTotal(o.items);
    const snapshot = o.items.map(it=>({name:it.name, qty:it.qty, price:it.price, status:it.status, paymentMethod:it.paymentMethod}));
    const methodsUsed = [...new Set(o.items.map(it=>it.paymentMethod).filter(Boolean))];
    const paymentSummary = methodsUsed.length===0 ? null : methodsUsed.length===1 ? methodsUsed[0] : 'mixed';
    const cashTotal = o.items.filter(it=>it.paymentMethod==='cash').reduce((s,it)=>s+it.price*it.qty,0);
    const qrisTotal = o.items.filter(it=>it.paymentMethod==='qris').reduce((s,it)=>s+it.price*it.qty,0);
    const openedAtIso = new Date(o.openedAt || Date.now()).toISOString();
    const closedAtIso = new Date().toISOString();
    delete state.orders[tableId];
    openTableId=null;
    if((o.openedAt || Date.now()) >= todayStartMs()){
      state.todaySales.push({total, closedAt: closedAtIso, items: snapshot, tableName: tname});
    }
    state.last10DaysSales.push({total, openedAt: openedAtIso});
    state.recentClosed.unshift({tableName:tname, total, paymentMethod:paymentSummary, closedAt:closedAtIso});
    state.recentClosed = state.recentClosed.slice(0,10);
    render();
    (async ()=>{
      try{
        await sb.from('pos_sales_log').insert({table_id:tableId, table_name:tname, items:snapshot, total:total, payment_method:paymentSummary, cash_total:cashTotal, qris_total:qrisTotal, opened_at:openedAtIso, closed_at:closedAtIso});
        await sb.from('pos_orders').delete().eq('table_id', tableId);
        showToast('Meja ditutup & direset');
      }catch(e){ reportError(e,'tutup meja'); }
    })();
  }

  function topMenuItems(n){
    const counts={};
    // Hitung dari filtered sales (closed orders)
    (state.filteredSales||[]).forEach(s=>{
      (s.items||[]).forEach(it=>{
        if((it.price||0)>0 && it.paymentMethod)
          counts[it.name]=(counts[it.name]||0)+(it.qty||0);
      });
    });
    // Hitung dari today's closed sales
    (state.todaySales||[]).forEach(s=>{
      (s.items||[]).forEach(it=>{
        if((it.price||0)>0 && it.paymentMethod)
          counts[it.name]=(counts[it.name]||0)+(it.qty||0);
      });
    });
    // Hitung dari active orders hari ini
    const start=todayStartMs();
    Object.values(state.orders).forEach(o=>{
      if((o.openedAt||0)>=start)
        (o.items||[]).forEach(it=>{ if(it.price>0) counts[it.name]=(counts[it.name]||0)+it.qty; });
    });
    const ranked=state.menu
      .map(m=>({...m,_count:counts[m.name]||0}))
      .sort((a,b)=>b._count-a._count||a.name.localeCompare(b.name));
    // Ambil top N; kalau kurang dari N pakai sisa menu sebagai pelengkap
    const topN=ranked.slice(0,n);
    if(topN.length<n){
      const used=new Set(topN.map(m=>m.name));
      const rest=state.menu.filter(m=>!used.has(m.name));
      return [...topN,...rest].slice(0,n);
    }
    return topN;
  }

  function exportOrdersCSV(rows){
    const statusLabel={pending:'Belum Diantar',belum_bayar:'Belum Bayar',lunas:'Lunas'};
    const header='Tanggal,Jam,Meja,Item,Qty,Status,Subtotal';
    const lines=rows.map(r=>{
      const d=new Date(r.time);
      return [
        d.toLocaleDateString('id-ID'),
        d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
        r.table, '"'+r.name+'"', r.qty,
        statusLabel[r.status]||r.status, r.subtotal
      ].join(',');
    });
    const csv=[header,...lines].join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='atras-orders.csv'; a.click();
    URL.revokeObjectURL(url);
    showToast('Data diekspor sebagai CSV');
  }

  function makeDraggable(box,t,canvas){
    let dragging=false;
    box.addEventListener('pointerdown',(ev)=>{ dragging=true; box.setPointerCapture(ev.pointerId); });
    box.addEventListener('pointermove',(ev)=>{
      if(!dragging) return;
      const rect = canvas.getBoundingClientRect();
      let x = ((ev.clientX-rect.left)/rect.width)*100;
      let y = ((ev.clientY-rect.top)/rect.height)*100;
      x = Math.max(3, Math.min(97,x)); y = Math.max(5, Math.min(95,y));
      box.style.left=x+'%'; box.style.top=y+'%'; t.x=x; t.y=y;
    });
    box.addEventListener('pointerup', ()=>{ if(dragging){ dragging=false; moveTableCommit(t.id, t.x, t.y); } });
  }

  function renderMenuView(el){
    const cats = orderedCategories();

      html += `<div class="chiprow" id="reorderChipRow" style="flex-wrap:wrap;">` + cats.map(c=>`<div class="chip" draggable="true" data-dragcat="${c}" style="cursor:grab;">⠿ ${c}</div>`).join('') + `</div>`;

    }
    const list = state.menu.filter(m=> menuCatFilter==='Semua' || m.cat===menuCatFilter);
    if(!categoryReorderMode){
      html += list.map(m=>`
        <div class="menurow">
          <div><div class="nm">${CAT_ICON[m.cat]||'🍴'} ${m.name}</div><div class="cat">${m.cat}</div></div>
          <div style="display:flex;align-items:center;">
            <div class="pr">${fmtMoney(m.price)}</div>
            <button class="btn btn-line" data-editmenu="${m.id}">Edit</button>
          </div>
        </div>
      `).join('');
    }
    el.innerHTML = html;
    document.getElementById('addMenuBtn').onclick = ()=>{ menuFormOpen={}; render(); };
    document.getElementById('reorderCatBtn').onclick = ()=>{ categoryReorderMode=!categoryReorderMode; render(); };
    el.querySelectorAll('[data-mcat]').forEach(c=>{ c.onclick=()=>{ menuCatFilter=c.dataset.mcat; render(); }; });
    el.querySelectorAll('[data-editmenu]').forEach(b=>{ b.onclick=()=>{ menuFormOpen = state.menu.find(m=>m.id===b.dataset.editmenu); render(); }; });
    if(categoryReorderMode){
      const row = document.getElementById('reorderChipRow');
      let dragSrc = null;
      let touchDragSrc = null;
      let touchDragEl = null;
      let touchOverEl = null;

      function doReorder(fromCat, toCat){
        if(!fromCat || !toCat || fromCat===toCat) return;
        const ord = orderedCategories();
        const from = ord.indexOf(fromCat), to = ord.indexOf(toCat);
        if(from===-1 || to===-1) return;
        ord.splice(from,1); ord.splice(to,0,fromCat);
        commitCategoryOrder(ord);
      }

      row.querySelectorAll('[data-dragcat]').forEach(chip=>{
        // Mouse drag
        chip.addEventListener('dragstart', (ev)=>{ dragSrc=chip.dataset.dragcat; ev.dataTransfer.effectAllowed='move'; });
        chip.addEventListener('dragover', (ev)=>{ ev.preventDefault(); chip.style.outline='2px solid var(--purple)'; });
        chip.addEventListener('dragleave', ()=>{ chip.style.outline=''; });
        chip.addEventListener('drop', (ev)=>{
          ev.preventDefault(); chip.style.outline='';
          doReorder(dragSrc, chip.dataset.dragcat);
        });
        chip.addEventListener('dragend', ()=>{ chip.style.outline=''; });

        // Touch drag
        chip.addEventListener('touchstart', (ev)=>{
          touchDragSrc = chip.dataset.dragcat;
          touchDragEl = chip;
          chip.style.opacity='0.55';
          chip.style.transform='scale(1.06)';
        }, {passive:true});

        chip.addEventListener('touchmove', (ev)=>{
          ev.preventDefault();
          const t = ev.touches[0];
          const el = document.elementFromPoint(t.clientX, t.clientY);
          const over = el?.closest('[data-dragcat]');
          if(touchOverEl && touchOverEl!==over) touchOverEl.style.outline='';
          if(over && over!==touchDragEl){
            over.style.outline='2px solid var(--purple)';
            touchOverEl = over;
          }
        }, {passive:false});

        chip.addEventListener('touchend', (ev)=>{
          if(touchDragEl){ touchDragEl.style.opacity=''; touchDragEl.style.transform=''; }
          if(touchOverEl){ touchOverEl.style.outline=''; }
          const t = ev.changedTouches[0];
          const el = document.elementFromPoint(t.clientX, t.clientY);
          const target = el?.closest('[data-dragcat]');
          if(target) doReorder(touchDragSrc, target.dataset.dragcat);
          touchDragSrc=null; touchDragEl=null; touchOverEl=null;
        }, {passive:true});
      });
    }
  }

    document.getElementById('referralToggle').onclick = ()=>{ referralMode=!referralMode; render(); };
    const searchInput = document.getElementById('orderSearchInput');
    searchInput.oninput = ()=>{ orderSearch = searchInput.value; render(); setTimeout(()=>{ const si=document.getElementById('orderSearchInput'); if(si){ si.focus(); si.setSelectionRange(si.value.length, si.value.length); } },0); };
    screen.querySelectorAll('[data-ocat]').forEach(c=>{ c.onclick=()=>{ orderCatFilter=c.dataset.ocat; render(); }; });
    screen.querySelectorAll('[data-inc]').forEach(b=>{
      b.onclick = ()=>{
        const m = state.menu.find(x=>x.id===b.dataset.inc);
        if(isNew){ applyIncrement(draftItems, m, effectivePrice(m)); render(); }
        else { incrementMenuQtyExisting(openTableId, m); }
      };
    });
    screen.querySelectorAll('[data-dec]').forEach(b=>{
      b.onclick = ()=>{
        const m = state.menu.find(x=>x.id===b.dataset.dec);
        if(isNew){ applyDecrement(draftItems, m, effectivePrice(m)); render(); }
        else { decrementMenuQtyExisting(openTableId, m); }
      };
    });
    screen.querySelectorAll('[data-toggle]').forEach(b=>{ b.onclick=()=>{ toggleItemStatus(openTableId, b.dataset.toggle); }; });
    screen.querySelectorAll('[data-note]').forEach(b=>{
      b.onclick = ()=>{ noteEditFor = {scope: isNew?'draft':'existing', tableId: isNew?null:openTableId, itemId: b.dataset.note}; render(); };
    });
    screen.querySelectorAll('[data-rm]').forEach(b=>{
      b.onclick = ()=>{
        if(isNew){ draftItems = draftItems.filter(i=>i.id!==b.dataset.rm); render(); }
        else { removeItem(openTableId, b.dataset.rm); }
      };
    });
    if(isNew){
      screen.querySelectorAll('[data-pick-table]').forEach(c=>{
        c.onclick = ()=>{
          const tid = c.dataset.pickTable;
          if(tableStatus(tid)!=='empty') return;
          draftTableId = tid; render();
        };
      });
      const spDraftBtn = document.getElementById('splitPayBtn');
      if(spDraftBtn) spDraftBtn.onclick = ()=>{ openSplitPay('draft', null); };
      const finishBtn = document.getElementById('finishNewBtn');
      if(finishBtn) finishBtn.onclick = finalizeNewOrder;
    } else {
      const spBtn = document.getElementById('splitPayBtn');
      if(spBtn) spBtn.onclick = ()=>{ openSplitPay('existing', openTableId); };
      document.getElementById('moveTableBtn').onclick = ()=>{ moveTableFrom = openTableId; render(); };
      document.getElementById('finishExistBtn').onclick = ()=>{ openTableId=null; render(); showToast('Pesanan disimpan'); };
      document.getElementById('cancelOrderBtn').onclick = ()=>{
        const tid = openTableId;
        delete state.orders[tid]; openTableId=null; render();
        sb.from('pos_orders').delete().eq('table_id', tid).then(({error})=>{ if(error) reportError(error,'batalkan pesanan'); });
      };
      const closeBtn = document.getElementById('closeTableBtn');
      if(closeBtn) closeBtn.onclick = ()=>{ closeTable(openTableId); };
    }
  }

  function renderConfirmCloseModal(){
    const t = tableById(confirmCloseTableId);
    if(!t){ confirmCloseTableId=null; return; }
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeCC">✕</button>
        <h2>Meja ${t.name} sudah lunas</h2>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">Semua pesanan sudah diantar & dibayar. Pelanggan sudah selesai dari meja ini?</div>
        <div class="modal-actions" style="flex-direction:column;">
          <button class="btn btn-purple" id="ccClose" style="width:100%;margin-bottom:8px;">✓ Selesai, Kosongkan Meja</button>
          <button class="btn btn-line" id="ccDetail" style="width:100%;">+ Tambah / Lihat Pesanan</button>
        </div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeCC').onclick = ()=>{ confirmCloseTableId=null; render(); };
    document.getElementById('ccClose').onclick = ()=>{ const tid=confirmCloseTableId; confirmCloseTableId=null; closeTable(tid); };
    document.getElementById('ccDetail').onclick = ()=>{ openTableId=confirmCloseTableId; confirmCloseTableId=null; referralMode=false; render(); };
  }

  function openSplitPay(mode, tableId){
    const items = mode==='draft' ? draftItems : (order(tableId) ? order(tableId).items : []);
    const lines = unpaidLines(items);
    if(lines.length===0) return;
    const selections = {};
    lines.forEach(it=>{ selections[it.id] = it.qty; }); // default: bayar penuh
    splitPayOpen = { mode, tableId, lines: lines.map(it=>({id:it.id, name:it.name, price:it.price, maxQty:it.qty})), selections, method:null };
    render();
  }
  function renderSplitPayModal(){
    const sp = splitPayOpen;
    const total = sp.lines.reduce((s,l)=> s + l.price*(sp.selections[l.id]||0), 0);
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal" style="width:380px;">
        <button class="closeX" id="closeSP">✕</button>
        <h2>Proses Pembayaran</h2>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Atur jumlah yang dibayar customer ini. Sisa qty tetap kebawa belum bayar.</div>
        <div style="max-height:260px;overflow-y:auto;margin-bottom:10px;">
          ${sp.lines.map(l=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);">
              <div style="flex:1;">
                <div style="font-weight:500;font-size:13px;">${l.name}</div>
                <div style="font-size:11px;color:var(--ink-soft);">${fmtMoney(l.price)} / unit · maks ${l.maxQty}</div>
              </div>
              <div class="qtystep" style="width:auto;gap:8px;">
                <button class="qbtn" data-spdec="${l.id}">−</button>
                <span class="qval">${sp.selections[l.id]||0}</span>
                <button class="qbtn add" data-spinc="${l.id}">+</button>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="total-row"><span>Total Dibayar</span><span>${fmtMoney(total)}</span></div>
        <div class="pay-row">
          <button class="${sp.method==='cash'?'sel cash':''}" data-spmethod="cash">💵<br/>Cash</button>
          <button class="${sp.method==='qris'?'sel qris':''}" data-spmethod="qris">📱<br/>QRIS</button>
        </div>
        <button class="btn btn-purple" id="spConfirm" style="width:100%;" ${total<=0 || !sp.method ? 'disabled':''}>✓ Konfirmasi Bayar ${fmtMoney(total)}</button>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeSP').onclick = ()=>{ splitPayOpen=null; render(); };
    overlay.querySelectorAll('[data-spinc]').forEach(b=>{
      b.onclick = ()=>{
        const id=b.dataset.spinc; const line=sp.lines.find(l=>l.id===id);
        sp.selections[id] = Math.min(line.maxQty, (sp.selections[id]||0)+1);
        render();
      };
    });
    overlay.querySelectorAll('[data-spdec]').forEach(b=>{
      b.onclick = ()=>{
        const id=b.dataset.spdec;
        sp.selections[id] = Math.max(0, (sp.selections[id]||0)-1);
        render();
      };
    });
    overlay.querySelectorAll('[data-spmethod]').forEach(b=>{
      b.onclick = ()=>{ sp.method = b.dataset.spmethod; render(); };
    });
    document.getElementById('spConfirm').onclick = async ()=>{
      await processSplitPayment();
    };
  }

  function escAttr(s){ return (s||'').replace(/"/g,'&quot;'); }
  function renderNoteModal(){
    const ctx = noteEditFor;
    const items = ctx.scope==='draft' ? draftItems : (order(ctx.tableId) ? order(ctx.tableId).items : []);
    const item = items.find(i=>i.id===ctx.itemId);
    if(!item){ noteEditFor=null; return; }
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeNote">✕</button>
        <h2>Catatan: ${item.name}</h2>
        <div class="formrow"><label>Misal: less sugar, telur setengah matang, pisahin saus</label><input type="text" id="noteInput" value="${escAttr(item.note)}" placeholder="Tulis catatan..."/></div>
        <div class="modal-actions"><button class="btn btn-purple" id="noteSave">Simpan</button></div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeNote').onclick = ()=>{ noteEditFor=null; render(); };
    document.getElementById('noteSave').onclick = ()=>{
      const val = document.getElementById('noteInput').value.trim();
      item.note = val;
      const scope = ctx.scope, itemId = ctx.itemId;
      noteEditFor = null;
      render();
      if(scope!=='draft'){
        sb.from('pos_order_items').update({note: val || null}).eq('id', itemId).then(({error})=>{ if(error) reportError(error,'simpan catatan'); });
      }
    };
  }

  async function moveTableOrder(oldTableId, newTableId){
    const o = order(oldTableId); if(!o) return;
    if(tableStatus(newTableId)!=='empty'){ showToast('Meja tujuan sudah terisi'); return; }
    const fromName = tableById(oldTableId).name, toName = tableById(newTableId).name;
    state.orders[newTableId] = o;
    delete state.orders[oldTableId];
    if(openTableId===oldTableId) openTableId = newTableId;
    render();
    try{
      await sb.from('pos_orders').insert({table_id:newTableId, created_at:new Date(o.openedAt).toISOString()});
      await sb.from('pos_order_items').update({table_id:newTableId}).eq('table_id', oldTableId);
      await sb.from('pos_orders').delete().eq('table_id', oldTableId);
      showToast('Pesanan dipindah dari Meja '+fromName+' ke Meja '+toName);
    }catch(e){ reportError(e,'pindah meja'); }
  }
  function renderUserSwitcherModal(){
    const users = [
      {name:'Pendi',   photo:'Pendi Photos.png'},
      {name:'Barista', photo:''},
    ];
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal" style="width:300px;">
        <button class="closeX" id="closeUS">✕</button>
        <h2 style="margin:0 0 16px;">Pilih Pengguna</h2>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${users.map(u=>`
            <div class="user-option ${activeUserName===u.name?'sel':''}" data-uname="${u.name}" data-uphoto="${u.photo}">
              <div class="uav">
                ${u.photo ? `<img src="${u.photo}" alt="${u.name}">` : '👤'}
              </div>
              <div>
                <div style="font-size:14px;font-weight:600;color:var(--ink);">${u.name}</div>
                <div style="font-size:11.5px;color:var(--ink-soft);">On Duty</div>
              </div>
              ${activeUserName===u.name ? '<span class="user-check">✓</span>' : ''}
            </div>`).join('')}
        </div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeUS').onclick=()=>{ userSwitcherOpen=false; render(); };
    overlay.querySelectorAll('[data-uname]').forEach(opt=>{
      opt.onclick=()=>{
        activeUserName=opt.dataset.uname;
        activeUserPhoto=opt.dataset.uphoto;
        userSwitcherOpen=false;
        render();
      };
    });
  }

  function renderMoveTableModal(){
    const fromT = tableById(moveTableFrom);
    if(!fromT){ moveTableFrom=null; return; }
    const emptyTables = state.tables.filter(tb=>tableStatus(tb.id)==='empty');
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeMT">✕</button>
        <h2>Pindah dari Meja ${fromT.name}</h2>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:12px;">Pilih meja kosong tujuan. Semua item, status diantar, dan pembayaran ikut pindah.</div>
        ${emptyTables.length===0 ? '<div class="empty-state" style="padding:20px 0;">Tidak ada meja kosong saat ini.</div>' : `
        <div class="tablepick-grid">
          ${emptyTables.map(tb=>`<div class="tablepick" data-movetarget="${tb.id}"><span class="swatch" style="background:${tableColor(tb.id)}"></span>${tb.name}</div>`).join('')}
        </div>`}
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeMT').onclick = ()=>{ moveTableFrom=null; render(); };
    overlay.querySelectorAll('[data-movetarget]').forEach(c=>{
      c.onclick = ()=>{
        const dest = c.dataset.movetarget;
        const src = moveTableFrom;
        moveTableFrom = null;
        moveTableOrder(src, dest);
      };
    });
  }

  function renderTableFormModal(){
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeTF">✕</button>
        <h2>Meja Baru</h2>
        <div class="formrow"><label>Nama / nomor meja</label><input type="text" id="tfName" placeholder="contoh: C1"/></div>
        <div class="modal-actions"><button class="btn btn-purple" id="tfSave">Simpan</button></div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeTF').onclick = ()=>{ tableFormOpen=null; render(); };
    document.getElementById('tfSave').onclick = ()=>{
      const name = document.getElementById('tfName').value.trim();
      if(!name) return;
      addTable(name, tableFormOpen.x, tableFormOpen.y);
      tableFormOpen=null; render();
    };
  }

  function renderMenuFormModal(){
    const editing = menuFormOpen && menuFormOpen.id;
    const overlay = document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML = `
      <div class="modal">
        <button class="closeX" id="closeMF">✕</button>
        <h2>${editing?'Edit Menu':'Tambah Menu'}</h2>
        <div class="formrow"><label>Nama item</label><input type="text" id="mfName" value="${editing?menuFormOpen.name:''}"/></div>
        <div class="formrow"><label>Harga (Rp)</label><input type="number" id="mfPrice" value="${editing?menuFormOpen.price:''}"/></div>
        <div class="formrow"><label>Kategori</label><input type="text" id="mfCat" value="${editing?menuFormOpen.cat:''}" placeholder="Minuman / Makanan / Snack"/></div>
        <div class="modal-actions">
          ${editing?'<button class="btn btn-line" id="mfDelete">Hapus</button>':''}
          <button class="btn btn-purple" id="mfSave">Simpan</button>
        </div>
      </div>`;
    app.appendChild(overlay);
    document.getElementById('closeMF').onclick = ()=>{ menuFormOpen=null; render(); };
    document.getElementById('mfSave').onclick = ()=>{
      const name = document.getElementById('mfName').value.trim();
      const price = parseInt(document.getElementById('mfPrice').value)||0;
      const cat = document.getElementById('mfCat').value.trim() || 'Lainnya';
      if(!name) return;
      if(editing) updateMenuItem(menuFormOpen.id, name, price, cat);
      else addMenuItem(name, price, cat);
      menuFormOpen=null; render();
    };
    if(editing){ document.getElementById('mfDelete').onclick = ()=>{ deleteMenuItem(menuFormOpen.id); menuFormOpen=null; render(); }; }
  }

  loadState();
})();
</script>
</body>
</html>
